name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check out public submodules (skip private treefolio)
        run: |
          # treefolio is a PRIVATE repo. With `submodules: true`, actions/checkout
          # clones submodules using the repo-scoped GITHUB_TOKEN, which cannot read
          # other private repos -> "repository not found" -> the whole checkout (and
          # thus the entire Pages deploy) fails. Skip it so the public site still
          # publishes. To include treefolio, add a PAT secret with read access and
          # clone it explicitly here instead.
          git config submodule.treefolio.update none
          git submodule update --init

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
